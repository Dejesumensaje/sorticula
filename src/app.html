<!doctype html>
<html lang="es-CO" class="no-js">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" content="#2a0a06" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Syne:wght@400;500;600;700;800&display=swap"
			rel="stylesheet"
		/>
		<script>
			// Elige una de las 5 paletas al azar ANTES de pintar (sin parpadeo).
			(function () {
				var p = ['pal-brasa', 'pal-fundido', 'pal-patina', 'pal-cobalto', 'pal-tinta'];
				document.documentElement.classList.add(p[(Math.random() * p.length) | 0]);
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
